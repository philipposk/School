<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="School — a small library of careful, short courses on hard subjects.">
  <meta name="theme-color" content="#F7F4EE">
  <title>School — careful courses on hard subjects</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23B8543A'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-style='italic' font-weight='400' font-size='20' text-anchor='middle' fill='%23F7F4EE'%3ES%3C/text%3E%3C/svg%3E">

  <!-- Fonts: Newsreader (serif display + body), Geist (UI + mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Geist:wght@400;450;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- Backend URL + global bootstrap. The feature scripts (auth, payments,
       AI, certs) were written against globals from the old monolithic
       index.html (user, state, courses, LearnerAnalytics, OnboardingManager).
       Declare safe defaults here so they don't throw on load. -->
  <script>
    if (!localStorage.getItem('backend_url')) {
      localStorage.setItem('backend_url', 'https://school-backend.fly.dev');
    }
    // Globals referenced by legacy feature scripts. App.js + scripts below
    // may overwrite them.
    var user = JSON.parse(localStorage.getItem('user') || 'null');
    var state = { completedModules: [], quizScores: {}, currentCourseId: null, currentModule: null };
    var courses = []; // populated after data.js loads
    var LearnerAnalytics = { streaks: { currentStreak: 0 }, timeTracking: {} };
    var OnboardingManager = { userGoals: [] };
    var AnalyticsManager = { trackEvent: function () {} };
    var i18n = window.i18n || { t: function (k) { return k; }, currentLanguage: 'en' };
    window.user = user; window.state = state;
    window.LearnerAnalytics = LearnerAnalytics;
    window.OnboardingManager = OnboardingManager;
    window.AnalyticsManager = AnalyticsManager;
    window.i18n = i18n;
  </script>

  <!-- Course catalog (defines window.COURSES + COURSE_CONTENT_DIR) -->
  <script src="assets/data.js"></script>
  <script>
    // Alias COURSES → courses so legacy modules that read `courses` work.
    courses = window.COURSES.map(function (c) {
      return {
        id: c.slug,
        title: c.title,
        description: c.blurb,
        modules_data: c.modules.map(function (m) { return { id: m.n, title: m.title, subtitle: m.sub }; })
      };
    });
    window.courses = courses;
  </script>

  <!-- Existing feature modules (load before app.js so it can wire UI to them) -->
  <script src="js/security.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth-enhanced.js"></script>
  <script src="js/payment-system.js"></script>
  <script src="js/ai-config.js"></script>
  <script src="js/ai-enhanced.js"></script>
  <script src="js/certificates.js"></script>

  <script src="assets/app.js"></script>
</body>
</html>
